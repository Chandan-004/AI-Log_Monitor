<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Log Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-header {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* CustomScrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .log-row {
            transition: all 0.2s ease;
        }

        .log-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="fixed top-0 w-full z-50 glass-header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div
                        class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                        <i data-lucide="activity" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight">LogSentinel</span>
                </div>

                <div class="flex items-center gap-4">
                    <div
                        class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-800/50 border border-gray-700/50">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-xs font-medium text-gray-400">System Operational</span>
                    </div>
                    <div class="relative group">
                        <button
                            class="flex items-center gap-2 hover:bg-gray-800 rounded-lg px-3 py-2 transition-colors">
                            <div
                                class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-sm font-medium">
                                U</div>
                            <span class="text-sm font-medium hidden sm:block" id="user-name">User</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                        </button>
                        <!-- Dropdown -->
                        <div
                            class="absolute right-0 mt-2 w-48 bg-gray-800 rounded-xl shadow-lg border border-gray-700 hidden group-hover:block transition-all">
                            <a href="#"
                                class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-white rounded-t-xl">Profile</a>
                            <a href="#"
                                class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-white">Settings</a>
                            <button id="logout-btn"
                                class="w-full text-left block px-4 py-2 text-sm text-red-400 hover:bg-gray-700 hover:text-red-300 rounded-b-xl">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass p-5 rounded-xl border-l-4 border-blue-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Total Logs</p>
                        <h3 class="text-2xl font-bold mt-1" id="stat-total">0</h3>
                    </div>
                    <div class="p-2 bg-blue-500/10 rounded-lg">
                        <i data-lucide="file-text" class="w-5 h-5 text-blue-500"></i>
                    </div>
                </div>
            </div>
            <div class="glass p-5 rounded-xl border-l-4 border-red-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Critical Alerts</p>
                        <h3 class="text-2xl font-bold mt-1 text-red-400" id="stat-critical">0</h3>
                    </div>
                    <div class="p-2 bg-red-500/10 rounded-lg">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
                    </div>
                </div>
            </div>
            <div class="glass p-5 rounded-xl border-l-4 border-yellow-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Warnings</p>
                        <h3 class="text-2xl font-bold mt-1 text-yellow-400" id="stat-warning">0</h3>
                    </div>
                    <div class="p-2 bg-yellow-500/10 rounded-lg">
                        <i data-lucide="alert-circle" class="w-5 h-5 text-yellow-500"></i>
                    </div>
                </div>
            </div>
            <div class="glass p-5 rounded-xl border-l-4 border-green-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-semibold">Recent Activity</p>
                        <h3 class="text-sm font-medium mt-2 text-gray-300">Just now</h3>
                    </div>
                    <div class="p-2 bg-green-500/10 rounded-lg">
                        <i data-lucide="activity" class="w-5 h-5 text-green-500"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                    <input type="text" id="search-logs" placeholder="Search logs..."
                        class="w-full pl-9 pr-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                </div>
                <select id="filter-level"
                    class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                    <option value="">All Levels</option>
                    <option value="info">Info</option>
                    <option value="warning">Warning</option>
                    <option value="error">Error</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <button onclick="openModal()"
                class="w-full md:w-auto flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-500/20">
                <i data-lucide="plus" class="w-4 h-4"></i>
                New Log Entry
            </button>
        </div>

        <!-- Logs Table -->
        <div class="glass rounded-xl overflow-hidden shadow-xl border border-gray-800">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-400">
                    <thead
                        class="bg-gray-800/50 text-xs uppercase font-semibold text-gray-300 border-b border-gray-700">
                        <tr>
                            <th class="px-6 py-4">Timestamp</th>
                            <th class="px-6 py-4">Level</th>
                            <th class="px-6 py-4">Service / Source</th>
                            <th class="px-6 py-4 w-1/3">Message</th>
                            <th class="px-6 py-4">AI Category</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-800/50" id="logs-table-body">
                        <!-- Logs will be injected here -->
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                Loading logs...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="px-6 py-4 border-t border-gray-800 flex items-center justify-between">
                <span class="text-xs text-gray-500" id="pagination-info">Showing 1-10 of 50</span>
                <div class="flex gap-2">
                    <button class="p-1 rounded hover:bg-gray-800 disabled:opacity-50" id="prev-page" disabled>
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <button class="p-1 rounded hover:bg-gray-800 disabled:opacity-50" id="next-page">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Create Log Modal -->
    <div id="log-modal" class="fixed inset-0 z-[60] hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

            <div class="fixed inset-0 bg-gray-900 bg-opacity-75 transition-opacity backdrop-blur-sm" aria-hidden="true"
                onclick="closeModal()"></div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div
                class="inline-block align-bottom glass rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full border border-gray-700">
                <div class="px-6 py-5 border-b border-gray-700/50 flex justify-between items-center">
                    <h3 class="text-lg leading-6 font-medium text-white" id="modal-title">Submit New Log</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <form id="create-log-form" class="p-6 space-y-4">
                    <div>
                        <label for="log-source" class="block text-sm font-medium text-gray-300 mb-1">Service /
                            Source</label>
                        <input type="text" id="log-source"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                            placeholder="e.g., auth-service, payment-gateway">
                    </div>

                    <div>
                        <label for="log-level" class="block text-sm font-medium text-gray-300 mb-1">Level</label>
                        <select id="log-level"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="error">Error</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>

                    <div>
                        <label for="log-message" class="block text-sm font-medium text-gray-300 mb-1">Log
                            Message</label>
                        <textarea id="log-message" rows="4"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                            placeholder="Paste the raw log message here for AI analysis..."></textarea>
                    </div>

                    <div class="pt-4 flex justify-end gap-3">
                        <button type="button" onclick="closeModal()"
                            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-300 hover:bg-gray-800 border border-gray-700 transition-colors">Cancel</button>
                        <button type="submit"
                            class="px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-500/20 transition-colors">Submit
                            Log</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
        function openModal() {
            document.getElementById('log-modal').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('log-modal').classList.add('hidden');
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
