<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Log Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #60a5fa;
            outline: none;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }
    </style>
</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-blue-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute top-[40%] -right-[10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[100px]"></div>
    </div>

    <!-- Auth Card -->
    <div class="w-full max-w-md p-8 glass rounded-2xl shadow-2xl relative z-10 mx-4">

        <div class="text-center mb-8">
            <h2 id="form-title" class="text-3xl font-bold mb-2">Welcome Back</h2>
            <p id="form-subtitle" class="text-gray-400 text-sm">Enter your credentials to access the dashboard</p>
        </div>

        <form id="auth-form" class="space-y-5">
            <div id="username-field" class="hidden">
                <label for="username" class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
                <input type="text" id="username" class="input-field w-full px-4 py-3 rounded-xl" placeholder="johndoe">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
                <input type="email" id="email" class="input-field w-full px-4 py-3 rounded-xl"
                    placeholder="name@company.com" required>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                <input type="password" id="password" class="input-field w-full px-4 py-3 rounded-xl"
                    placeholder="••••••••" required>
            </div>

            <div class="flex items-center justify-between text-sm" id="forgot-password-container">
                <label class="flex items-center text-gray-400 hover:text-gray-300 cursor-pointer">
                    <input type="checkbox"
                        class="mr-2 rounded border-gray-600 bg-gray-700 text-blue-500 focus:ring-offset-gray-900 focus:ring-blue-500">
                    <span>Remember me</span>
                </label>
                <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">Forgot Password?</a>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl font-bold text-white shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5 transition-all duration-300">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-gray-400 text-sm">
                <span id="toggle-text">Don't have an account?</span>
                <button id="toggle-auth"
                    class="text-blue-400 font-semibold hover:text-blue-300 ml-1 transition-colors">Create
                    Account</button>
            </p>
        </div>

        <!-- Alert Box -->
        <div id="alert-box" class="hidden mt-4 p-3 rounded-lg text-sm text-center"></div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
